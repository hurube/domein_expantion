<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>領域展開 Online - Developed by ふるべ</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
      body {
        margin: 0;
        background: #000;
        color: white;
        font-family: sans-serif;
        overflow: hidden;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
      #menu-toggle {
        position: absolute;
        top: 20px;
        left: 20px;
        width: 50px;
        height: 50px;
        background: rgba(20, 20, 20, 0.9);
        border: 1px solid #444;
        border-radius: 50%;
        color: white;
        font-size: 24px;
        cursor: pointer;
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #info {
        position: absolute;
        top: 85px;
        left: 20px;
        background: rgba(10, 10, 10, 0.95);
        padding: 25px;
        border-radius: 20px;
        z-index: 1000;
        border: 1px solid #444;
        width: 300px;
        max-height: 75vh;
        overflow-y: auto;
        transition: 0.4s;
      }
      #info.hidden {
        transform: translateX(-380px);
        opacity: 0;
      }
      .dev-name {
        font-size: 1.1em;
        font-weight: bold;
        color: #fff;
        margin-bottom: 5px;
        border-left: 3px solid #3498db;
        padding-left: 10px;
      }
      .license {
        font-size: 0.6em;
        color: #555;
        margin-bottom: 15px;
        padding-left: 13px;
        line-height: 1.2;
      }
      input {
        background: #1a1a1a;
        color: white;
        border: 1px solid #333;
        padding: 12px;
        width: 100%;
        border-radius: 8px;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      #record-btn {
        background: #e74c3c;
        color: white;
        padding: 15px;
        width: 100%;
        border-radius: 8px;
        font-weight: bold;
        border: none;
        margin-bottom: 15px;
        cursor: pointer;
      }
      .tech-item {
        background: #181818;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        border: 1px solid #333;
        position: relative;
        cursor: pointer;
      }
      .score-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        border-radius: 0 0 0 12px;
        transition: 0.2s;
      }
      .hand-type-tag {
        font-size: 0.7em;
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        margin-left: 5px;
        vertical-align: middle;
      }
      #hand-status {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 0.8em;
        color: #aaa;
        pointer-events: none;
        border: 1px solid #333;
      }
      #edit-panel {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1a1a;
        padding: 25px;
        border-radius: 15px;
        border: 2px solid #555;
        z-index: 2000;
        width: 280px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
      }
      .save-btn {
        background: #2ecc71;
        color: white;
        padding: 10px;
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      #expansion-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 100;
        display: none;
      }
      body.active #expansion-container {
        display: block;
      }
      #expansion-text {
        font-size: 10vw;
        font-weight: 900;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <button id="menu-toggle">⚙️</button>
    <div id="info">
      <div class="dev-name">Developed by ふるべ</div>
      <div class="license">
        © 2026 FURUBE<br />Powered by MediaPipe (Apache 2.0)
      </div>
      <input type="text" id="t-name" placeholder="術式名..." />
      <button id="record-btn">印を記録 (5秒後)</button>
      <div
        id="status"
        style="
          color: #f1c40f;
          font-size: 0.8em;
          margin-bottom: 15px;
          text-align: center;
        "
      >
        Ready
      </div>
      <div id="it-cont"></div>
    </div>

    <div id="hand-status">カメラに手をかざしてください</div>

    <div id="edit-panel">
      <div style="text-align: center; font-weight: bold; margin-bottom: 15px">
        術式修正
      </div>
      <label style="font-size: 0.7em; color: #888">名前</label>
      <input type="text" id="ed-n" />
      <label style="font-size: 0.7em; color: #888">色</label>
      <input type="color" id="ed-c" style="height: 40px; padding: 2px" />

      <label
        style="
          font-size: 0.7em;
          color: #888;
          display: flex;
          justify-content: space-between;
          margin-top: 5px;
        "
      >
        正確さの要求 <span id="ed-th-val">0.85</span>
      </label>
      <input
        type="range"
        id="ed-th"
        min="0.5"
        max="0.99"
        step="0.01"
        style="margin: 10px 0"
        oninput="document.getElementById('ed-th-val').innerText = this.value"
      />

      <button class="save-btn" id="ed-sv">保存</button>
      <button
        style="
          background: #444;
          color: white;
          padding: 8px;
          width: 100%;
          margin-top: 5px;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
        onclick="document.getElementById('edit-panel').style.display = 'none'"
      >
        閉じる
      </button>
    </div>

    <div id="expansion-container"><div id="expansion-text">領域展開</div></div>
    <canvas id="output_canvas"></canvas>
    <video id="input_video" style="display: none"></video>
